// Helper: parse "HH:MM:SS.ms" string → seconds
function parseTime(t) {
  if (!t || t === "-") return null;
  const str = String(t).trim();
  // format: 00:00:24.260000 or 00:02:08
  const parts = str.split(":");
  if (parts.length !== 3) return null;
  const h = parseInt(parts[0], 10);
  const m = parseInt(parts[1], 10);
  const s = parseFloat(parts[2]);
  return h * 3600 + m * 60 + s;
}

function fmtSec(s) {
  if (s == null) return "-";
  const mm = Math.floor(s / 60);
  const ss = (s % 60).toFixed(2).padStart(5, "0");
  return mm > 0 ? `${mm}:${ss}` : `${ss}`;
}

function getDistancias(piscina, genero) {
  return Object.keys(DATA[piscina][genero]);
}

// ─── COMPONENT ────────────────────────────────────────────────────────────────
function App() {
  const [piscina, setPiscina] = useState("PL");
  const [genero, setGenero] = useState("Masculinos");
  const [distancia, setDistancia] = useState("");
  const [escalao, setEscalao] = useState("");
  const [tempoInput, setTempoInput] = useState("");
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");

  const distancias = useMemo(() => getDistancias(piscina, genero), [piscina, genero]);

  // reset distancia if not available
  useMemo(() => {
    if (distancia && !distancias.includes(distancia)) setDistancia("");
  }, [distancias]);

  function parseTempoInput(s) {
    s = s.trim();
    // accept: MM:SS.cc or SS.cc or MM:SS
    const r1 = /^(\d+):(\d{2})\.(\d+)$/.exec(s);
    if (r1) return parseInt(r1[1]) * 60 + parseFloat(r1[2] + "." + r1[3]);
    const r2 = /^(\d+):(\d{2})$/.exec(s);
    if (r2) return parseInt(r2[1]) * 60 + parseInt(r2[2]);
    const r3 = /^(\d+)\.(\d+)$/.exec(s);
    if (r3) return parseFloat(s);
    const r4 = /^(\d+)$/.exec(s);
    if (r4) return parseInt(s);
    return null;
  }

  function verificar() {
    setError("");
    setResult(null);
    if (!piscina || !genero || !distancia || !escalao || !tempoInput) {
      setError("Preenche todos os campos.");
      return;
    }
    const tempoSec = parseTempoInput(tempoInput);
    if (tempoSec === null) {
      setError("Formato de tempo inválido. Usa MM:SS.cc ou SS.cc");
      return;
    }
    const row = DATA[piscina][genero][distancia];
    if (!row) { setError("Combinação não encontrada."); return; }
    const idx = ESCALOES.indexOf(escalao);
    if (idx === -1) { setError("Escalão inválido."); return; }
    const minimo = row[idx];
    // Find next (faster = lower index) escalão that has a time
    const proxIdx = idx - 1;
    const proximoMinimo = proxIdx >= 0 ? row[proxIdx] : null;
    const passou = tempoSec <= minimo;
    // % of minimo: how close to the minimum (100% = exactly on minimo, <100% = faster)
    const pctMinimo = (tempoSec / minimo) * 100;
    // % toward next escalão
    let pctProximo = null;
    if (proximoMinimo !== null) {
      // 0% = current minimo, 100% = next minimo (faster)
      pctProximo = ((minimo - tempoSec) / (minimo - proximoMinimo)) * 100;
    }
    setResult({ passou, tempoSec, minimo, pctMinimo, escalao, proximoMinimo, proxIdx, pctProximo, row, idx });
  }

  function fmtPct(v) { return v.toFixed(1) + "%"; }

    ? result.passou ? "#00e5a0" : "#ff4f6d"
    : "#00e5a0";

          alt="FOCA Logo"
          style={{
            width: 72, height: 72, borderRadius: "50%",
            objectFit: "cover", flexShrink: 0,
            border: "2px solid #FFD700",
            boxShadow: "0 0 12px #FFD70044",
          }}
        />
        <div>
          <div style={{ fontSize: 13, fontWeight: 800, letterSpacing: 1, color: "#FFD700", marginBottom: 2 }}>
            FOCA – CLUBE DE NATAÇÃO DE FELGUEIRAS
          </div>
          <div style={{ fontSize: 11, letterSpacing: 2, color: "#1a7fd4", marginBottom: 6, textTransform: "uppercase" }}>
            Época 2025-2026
          </div>
          <div style={{ fontSize: 17, fontWeight: 700, letterSpacing: -0.5, color: "#fff8e0" }}>
            Verificador de Mínimos
          </div>
        </div>
      </div>

      <div style={{ width: "100%", maxWidth: 560, display: "flex", flexDirection: "column", gap: 16 }}>
        {/* Row 1: Piscina + Género */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Field label="Piscina">
            <SegControl
              options={[{v:"PL",l:"Longa"},{v:"PC",l:"Curta"}]}
              value={piscina}
              onChange={v => { setPiscina(v); setDistancia(""); setResult(null); }}
            />
          </Field>
          <Field label="Género">
            <SegControl
              options={[{v:"Masculinos",l:"Masc"},{v:"Femininos",l:"Fem"}]}
              value={genero}
              onChange={v => { setGenero(v); setDistancia(""); setResult(null); }}
            />
          </Field>
        </div>

        {/* Row 2: Distância + Escalão */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Field label="Distância / Estilo">
            <Select value={distancia} onChange={e => { setDistancia(e.target.value); setResult(null); }}
              placeholder="Escolhe...">
              {distancias.map(d => <option key={d} value={d}>{d}</option>)}
            </Select>
          </Field>
          <Field label="Escalão">
            <Select value={escalao} onChange={e => { setEscalao(e.target.value); setResult(null); }}
              placeholder="Escolhe...">
              {ESCALOES.map(e => <option key={e} value={e}>{e}</option>)}
            </Select>
          </Field>
        </div>

        {/* Tempo */}
        <Field label="Tempo realizado">
          <input
            value={tempoInput}
            onChange={e => { setTempoInput(e.target.value); setResult(null); }}
            placeholder="ex: 1:05.43 ou 25.10"
            onKeyDown={e => e.key === "Enter" && verificar()}
            style={{
              width: "100%", boxSizing: "border-box",
              background: "#111827", border: "1px solid #1e2e50",
              borderRadius: 10, padding: "12px 14px",
              color: "#e8eaf0", fontSize: 16, fontFamily: "inherit",
              outline: "none", letterSpacing: 1,
            }}
          />
        </Field>

        {/* Button */}
        <button
          onClick={verificar}
          style={{
            background: "linear-gradient(135deg,#FFD700 0%,#1a7fd4 100%)",
            border: "none", borderRadius: 10, padding: "14px 0",
            color: "#000", fontFamily: "inherit", fontWeight: 700,
            fontSize: 15, cursor: "pointer", letterSpacing: 1,
            textTransform: "uppercase", transition: "opacity .15s",
          }}
          onMouseOver={e => e.target.style.opacity = ".85"}
          onMouseOut={e => e.target.style.opacity = "1"}
        >
          Verificar
        </button>

        {error && (
          <div style={{
            background: "#1a0e14", border: "1px solid #ff4f6d",
            borderRadius: 10, padding: "12px 16px",
            color: "#ff8099", fontSize: 13,
          }}>{error}</div>
        )}

        {/* RESULT */}
        {result && <ResultCard result={result} piscina={piscina} genero={genero} distancia={distancia} />}
      </div>
    </div>
  );
}

function ResultCard({ result, piscina, genero, distancia }) {
  const { passou, tempoSec, minimo, pctMinimo, escalao, proximoMinimo, proxIdx, pctProximo, row, idx } = result;
  const diff = tempoSec - minimo;
  const diffLabel = diff >= 0 ? `+${diff.toFixed(2)}s acima` : `${Math.abs(diff).toFixed(2)}s abaixo`;

  return (
    <div style={{
      background: "#0d1525",
      border: `1px solid ${passou ? "#00e5a0" : "#ff4f6d"}`,
      borderRadius: 16, padding: 24,
      display: "flex", flexDirection: "column", gap: 20,
      boxShadow: `0 0 32px ${passou ? "#00e5a022" : "#ff4f6d22"}`,
    }}>
      {/* Status badge */}
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{
          background: passou ? "#00e5a022" : "#ff4f6d22",
          border: `1px solid ${passou ? "#00e5a0" : "#ff4f6d"}`,
          borderRadius: 8, padding: "6px 14px",
          color: passou ? "#00e5a0" : "#ff4f6d",
          fontWeight: 700, fontSize: 13, letterSpacing: 2, textTransform: "uppercase",
        }}>
          {passou ? "✓ Mínimo atingido" : "✗ Fora do mínimo"}
        </div>
        <div style={{ color: "#4a6080", fontSize: 13 }}>
          {PISCINA_LABEL[piscina]} · {genero === "Masculinos" ? "Masc" : "Fem"} · {distancia} · {escalao}
        </div>
      </div>

      {/* Times comparison */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <StatBox label="Teu tempo" value={fmtSec(tempoSec)} accent="#c0ccee" />
        <StatBox label={`Mínimo ${escalao}`} value={fmtSec(minimo)} accent={passou ? "#00e5a0" : "#ff4f6d"} />
      </div>

      {/* Diff */}
      <div style={{
        background: "#111827", borderRadius: 10, padding: "10px 16px",
        display: "flex", justifyContent: "space-between", alignItems: "center",
      }}>
        <span style={{ color: "#4a6080", fontSize: 13 }}>Diferença para o mínimo</span>
        <span style={{ color: passou ? "#00e5a0" : "#ff4f6d", fontWeight: 700 }}>{diffLabel}</span>
      </div>

      {/* % of minimo bar */}
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, fontSize: 12, color: "#4a6080" }}>
          <span>% do mínimo {escalao}</span>
          <span style={{ color: passou ? "#00e5a0" : "#ff4f6d", fontWeight: 700 }}>{pctMinimo.toFixed(1)}%</span>
        </div>
        <div style={{ height: 6, background: "#1a2540", borderRadius: 4, overflow: "hidden" }}>
          <div style={{
            height: "100%", borderRadius: 4,
            width: `${Math.min(pctMinimo, 150)}%`,
            background: passou
              ? "linear-gradient(90deg,#00e5a0,#0ff6e4)"
              : "linear-gradient(90deg,#ff4f6d,#ff8c42)",
            transition: "width .6s cubic-bezier(.4,0,.2,1)",
            maxWidth: "100%",
          }} />
        </div>
        <div style={{ fontSize: 11, color: "#2a3a5a", marginTop: 4 }}>
          100% = exatamente no mínimo · abaixo de 100% = mais rápido ✓
        </div>
      </div>

      {/* Next escalão */}
      {proxIdx >= 0 && proximoMinimo !== null && (
        <div style={{
          background: "#0a111e", border: "1px solid #1e2e50",
          borderRadius: 12, padding: 16, display: "flex", flexDirection: "column", gap: 12,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 2, textTransform: "uppercase", marginBottom: 2 }}>
                Escalão seguinte
              </div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#7eb8ff" }}>{ESCALOES[proxIdx]}</div>
            </div>
            <StatBox label="Mínimo" value={fmtSec(proximoMinimo)} accent="#7eb8ff" small />
          </div>
          {pctProximo !== null && (
            <>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#4a6080", marginBottom: 4 }}>
                <span>Progresso para {ESCALOES[proxIdx]}</span>
                <span style={{ color: "#7eb8ff", fontWeight: 700 }}>
                  {pctProximo <= 0 ? "0%" : pctProximo >= 100 ? "100% ✓" : pctProximo.toFixed(1) + "%"}
                </span>
              </div>
              <div style={{ height: 6, background: "#1a2540", borderRadius: 4, overflow: "hidden" }}>
                <div style={{
                  height: "100%", borderRadius: 4,
                  width: `${Math.min(Math.max(pctProximo, 0), 100)}%`,
                  background: "linear-gradient(90deg,#1060ff,#7eb8ff)",
                  transition: "width .6s cubic-bezier(.4,0,.2,1)",
                }} />
              </div>
              {pctProximo < 100 && (
                <div style={{ fontSize: 12, color: "#4a6080" }}>
                  Faltam <span style={{ color: "#7eb8ff", fontWeight: 700 }}>{(tempoSec - proximoMinimo).toFixed(2)}s</span> para o próximo escalão
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* All escalões mini table */}
      <div>
        <div style={{ fontSize: 11, letterSpacing: 2, color: "#2a3a5a", textTransform: "uppercase", marginBottom: 10 }}>
          Todos os mínimos — {distancia}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {ESCALOES.map((e, i) => {
            const t = row[i];
            const isSelected = i === idx;
            const isNext = i === proxIdx;
            return (
              <div key={e} style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                padding: "6px 10px", borderRadius: 8,
                background: isSelected ? "#1a2540" : isNext ? "#0f1a2e" : "transparent",
                border: isSelected
                  ? `1px solid ${passou ? "#00e5a0" : "#ff4f6d"}`
                  : isNext ? "1px solid #1e3060" : "1px solid transparent",
                fontSize: 13,
              }}>
                <span style={{ color: isSelected ? "#e8eaf0" : isNext ? "#7eb8ff" : "#2a3a5a" }}>{e}</span>
                <span style={{ color: isSelected ? (passou ? "#00e5a0" : "#ff4f6d") : isNext ? "#7eb8ff" : "#2a3a5a", fontWeight: isSelected ? 700 : 400 }}>
                  {fmtSec(t)}
                </span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function StatBox({ label, value, accent, small }) {
  return (
    <div style={{
      background: "#111827", borderRadius: 10,
      padding: small ? "8px 12px" : "12px 14px",
      display: "flex", flexDirection: "column", gap: 4,
    }}>
      <div style={{ fontSize: 11, color: "#4a6080", letterSpacing: 1, textTransform: "uppercase" }}>{label}</div>
      <div style={{ fontSize: small ? 16 : 22, fontWeight: 700, color: accent, letterSpacing: 1 }}>{value}</div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      <label style={{ fontSize: 11, letterSpacing: 2, color: "#4a6080", textTransform: "uppercase" }}>{label}</label>
      {children}
    </div>
  );
}

function SegControl({ options, value, onChange }) {
  return (
    <div style={{
      display: "flex", background: "#111827",
      border: "1px solid #1e2e50", borderRadius: 10, overflow: "hidden",
    }}>
      {options.map(o => (
        <button key={o.v} onClick={() => onChange(o.v)} style={{
          flex: 1, padding: "11px 0", border: "none",
          background: value === o.v ? "linear-gradient(135deg,#FFD700,#1a7fd4)" : "transparent",
          color: value === o.v ? "#0a1a08" : "#5a7090",
          fontFamily: "inherit", fontWeight: value === o.v ? 700 : 400,
          fontSize: 13, cursor: "pointer", transition: "all .15s",
          letterSpacing: 1,
        }}>{o.l}</button>
      ))}
    </div>
  );
}

function Select({ value, onChange, children, placeholder }) {
  return (
    <select value={value} onChange={onChange} style={{
      background: "#111827", border: "1px solid #1e2e50",
      borderRadius: 10, padding: "12px 14px",
      color: value ? "#e8eaf0" : "#4a6080",
      fontSize: 14, fontFamily: "inherit",
      outline: "none", cursor: "pointer", width: "100%",
    }}>
      <option value="">{placeholder}</option>
      {children}
    </select>
  );
}

function fmtSec(s) {
  if (s == null) return "-";
  const mm = Math.floor(s / 60);
  const ss = (s % 60).toFixed(2).padStart(5, "0");
  return mm > 0 ? `${mm}:${ss}` : `${ss}`;
}
